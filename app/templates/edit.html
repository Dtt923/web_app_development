{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0 mt-4">
            <div class="card-header bg-white border-bottom-0 pt-4 pb-2">
                <h4 class="card-title fw-bold text-center mb-0">編輯任務</h4>
            </div>
            <div class="card-body px-4 pb-4">
                <form action="{{ url_for('task_bp.update_task', id=task.id) }}" method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label text-muted small fw-bold">任務標題 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control bg-light border-0 form-control-lg fs-6" id="title" name="title" value="{{ task.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label text-muted small fw-bold">詳細描述</label>
                        <textarea class="form-control bg-light border-0" id="description" name="description" rows="5">{{ task.description or '' }}</textarea>
                    </div>
                    <div class="mb-4">
                        <label for="due_date" class="form-label text-muted small fw-bold">到期日</label>
                        <input type="date" class="form-control bg-light border-0" id="due_date" name="due_date" value="{{ task.due_date or '' }}">
                    </div>
                    
                    <hr class="text-muted opacity-25 my-4">
                    
                    <div class="d-flex justify-content-between align-items-center">
                        <a href="{{ url_for('task_bp.index') }}" class="btn btn-light text-secondary fw-semibold px-4">
                            <i class="bi bi-arrow-left"></i> 取消返回
                        </a>
                        <button type="submit" class="btn btn-primary fw-bold px-5 shadow-sm">
                            <i class="bi bi-check2"></i> 儲存變更
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
